      document.documentElement.dataset.theme = saved || sys;

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    /* ═══════════════════════════════════════════════════════════
       SEMANTIC DESIGN TOKENS — Dark theme (default)
       ═══════════════════════════════════════════════════════════ */
    :root, [data-theme="dark"] {
      /* Surfaces */
      --bg:  #09090F;
      --s1:  #111119;
      --s2:  #16171F;
      --s3:  #1D1E2C;
      --s4:  #252638;
      /* Borders */
      --b1:  rgba(255,255,255,0.05);
      --b2:  rgba(255,255,255,0.09);
      --b3:  rgba(255,255,255,0.18);
      /* Text */
      --t1:  rgba(255,255,255,0.93);
      --t2:  rgba(255,255,255,0.60);
      --t3:  rgba(255,255,255,0.36);
      --t4:  rgba(255,255,255,0.18);
      /* Brand */
      --primary:      #7BA8FF;
      --primary-dim:  rgba(123,168,255,0.14);
      --on-primary:   #07080F;
      --purple:       #A87FFF;
      --purple-dim:   rgba(168,127,255,0.12);
      --teal:         #2DD4A0;
      --teal-dim:     rgba(45,212,160,0.10);
      --warm:         #FF9070;
      --warm-dim:     rgba(255,144,112,0.12);
      --gold:         #F5C842;
      /* Semantic states */
      --success:      #4ade80;
      --warning:      #fb923c;
      --danger:       #F87171;
      /* Shadows */
      --shadow-sm:      0 1px 4px rgba(0,0,0,0.30);
      --shadow-md:      0 4px 16px rgba(0,0,0,0.42);
      --shadow-lg:      0 8px 32px rgba(0,0,0,0.55);
      --shadow-primary: 0 4px 20px rgba(123,168,255,0.25);
      /* Button tokens — contained */
      --btn-p-bg:      #7BA8FF;
      --btn-p-hov:     #9DBEFF;
      --btn-p-press:   #5A8FE8;
      --btn-p-text:    #07080F;
      /* Button tokens — tonal */
      --btn-t-bg:      rgba(123,168,255,0.12);
      --btn-t-hov:     rgba(123,168,255,0.22);
      --btn-t-text:    #7BA8FF;
      --btn-t-border:  rgba(123,168,255,0.22);
      --btn-t-bor-hov: rgba(123,168,255,0.42);
      /* Button tokens — outlined */
      --btn-o-bg:      transparent;
      --btn-o-hov:     rgba(123,168,255,0.08);
      --btn-o-text:    #7BA8FF;
      --btn-o-border:  rgba(123,168,255,0.38);
      --btn-o-bor-hov: rgba(123,168,255,0.60);
      /* Button tokens — ghost */
      --btn-g-bg:      rgba(255,255,255,0.04);
      --btn-g-hov:     rgba(255,255,255,0.09);
      --btn-g-text:    rgba(255,255,255,0.58);
      --btn-g-txt-hov: rgba(255,255,255,0.88);
      --btn-g-border:  rgba(255,255,255,0.09);
      --btn-g-bor-hov: rgba(255,255,255,0.18);
      /* Button tokens — text */
      --btn-tx-bg:     transparent;
      --btn-tx-hov:    rgba(255,255,255,0.05);
      --btn-tx-text:   rgba(255,255,255,0.52);
      --btn-tx-hov-t:  rgba(255,255,255,0.80);
      /* Button tokens — destructive */
      --btn-d-bg:      rgba(248,113,113,0.09);
      --btn-d-hov:     rgba(248,113,113,0.18);
      --btn-d-text:    #F87171;
      --btn-d-border:  rgba(248,113,113,0.22);
      --btn-d-bor-hov: rgba(248,113,113,0.45);
      /* Button tokens — ai */
      --btn-ai-bg:     rgba(45,212,160,0.10);
      --btn-ai-hov:    rgba(45,212,160,0.20);
      --btn-ai-text:   #2DD4A0;
      --btn-ai-border: rgba(45,212,160,0.24);
      --btn-ai-bh:     rgba(45,212,160,0.45);
      /* Button tokens — collection */
      --btn-c-bg:      rgba(168,127,255,0.12);
      --btn-c-hov:     rgba(168,127,255,0.22);
      --btn-c-text:    #A87FFF;
      --btn-c-border:  rgba(168,127,255,0.24);
      --btn-c-bh:      rgba(168,127,255,0.45);
      /* Focus ring */
      --focus-ring: 0 0 0 3px rgba(123,168,255,0.35);
      /* Chip tokens */
      --chip-neutral-bg:   rgba(255,255,255,0.05);
      --chip-neutral-bor:  rgba(255,255,255,0.09);
      --chip-neutral-text: rgba(255,255,255,0.45);
      --chip-neutral-sel:  rgba(255,255,255,0.12);
      --chip-neutral-sbor: rgba(255,255,255,0.22);
      --chip-neutral-stxt: rgba(255,255,255,0.88);
      /* Nav */
      --nav-active-bg:   rgba(123,168,255,0.14);
      --nav-hov-bg:      rgba(255,255,255,0.04);
      --nav-indicator:   #7BA8FF;
      /* Misc */
      --input-bg:      rgba(255,255,255,0.04);
      --scrollbar:     rgba(255,255,255,0.10);
    }

    /* ═══════════════════════════════════════════════════════════
       LIGHT THEME — Warm editorial palette
       ═══════════════════════════════════════════════════════════ */
    [data-theme="light"] {
      --bg:  #F2F0EA;
      --s1:  #E8E5DC;
      --s2:  #FAFAF6;
      --s3:  #F0EDE4;
      --s4:  #E8E4D8;
      --b1:  rgba(40,35,20,0.07);
      --b2:  rgba(40,35,20,0.12);
      --b3:  rgba(40,35,20,0.24);
      --t1:  rgba(18,14,6,0.92);
      --t2:  rgba(18,14,6,0.62);
      --t3:  rgba(18,14,6,0.40);
      --t4:  rgba(18,14,6,0.22);
      --primary:      #1D4ED8;
      --primary-dim:  rgba(29,78,216,0.10);
      --on-primary:   #FFFFFF;
      --purple:       #6D28D9;
      --purple-dim:   rgba(109,40,217,0.10);
      --teal:         #047857;
      --teal-dim:     rgba(4,120,87,0.10);
      --warm:         #C2410C;
      --warm-dim:     rgba(194,65,12,0.10);
      --gold:         #B45309;
      --success:      #15803d;
      --warning:      #C2410C;
      --danger:       #DC2626;
      --shadow-sm:      0 1px 4px rgba(0,0,0,0.07);
      --shadow-md:      0 4px 16px rgba(0,0,0,0.10);
      --shadow-lg:      0 8px 32px rgba(0,0,0,0.14);
      --shadow-primary: 0 4px 20px rgba(29,78,216,0.20);
      /* Buttons — contained */
      --btn-p-bg:      #1D4ED8;
      --btn-p-hov:     #1E40AF;
      --btn-p-press:   #1E3A8A;
      --btn-p-text:    #FFFFFF;
      /* tonal */
      --btn-t-bg:      rgba(29,78,216,0.10);
      --btn-t-hov:     rgba(29,78,216,0.18);
      --btn-t-text:    #1D4ED8;
      --btn-t-border:  rgba(29,78,216,0.22);
      --btn-t-bor-hov: rgba(29,78,216,0.40);
      /* outlined */
      --btn-o-bg:      transparent;
      --btn-o-hov:     rgba(29,78,216,0.07);
      --btn-o-text:    #1D4ED8;
      --btn-o-border:  rgba(29,78,216,0.40);
      --btn-o-bor-hov: rgba(29,78,216,0.65);
      /* ghost */
      --btn-g-bg:      rgba(0,0,0,0.04);
      --btn-g-hov:     rgba(0,0,0,0.08);
      --btn-g-text:    rgba(18,14,6,0.58);
      --btn-g-txt-hov: rgba(18,14,6,0.88);
      --btn-g-border:  rgba(40,35,20,0.12);
      --btn-g-bor-hov: rgba(40,35,20,0.24);
      /* text */
      --btn-tx-bg:     transparent;
      --btn-tx-hov:    rgba(0,0,0,0.05);
      --btn-tx-text:   rgba(18,14,6,0.52);
      --btn-tx-hov-t:  rgba(18,14,6,0.80);
      /* destructive */
      --btn-d-bg:      rgba(220,38,38,0.07);
      --btn-d-hov:     rgba(220,38,38,0.14);
      --btn-d-text:    #DC2626;
      --btn-d-border:  rgba(220,38,38,0.22);
      --btn-d-bor-hov: rgba(220,38,38,0.42);
      /* ai */
      --btn-ai-bg:     rgba(4,120,87,0.09);
      --btn-ai-hov:    rgba(4,120,87,0.17);
      --btn-ai-text:   #047857;
      --btn-ai-border: rgba(4,120,87,0.22);
      --btn-ai-bh:     rgba(4,120,87,0.42);
      /* collection */
      --btn-c-bg:      rgba(109,40,217,0.09);
      --btn-c-hov:     rgba(109,40,217,0.17);
      --btn-c-text:    #6D28D9;
      --btn-c-border:  rgba(109,40,217,0.22);
      --btn-c-bh:      rgba(109,40,217,0.42);
      /* focus */
      --focus-ring:    0 0 0 3px rgba(29,78,216,0.28);
      /* chips */
      --chip-neutral-bg:   rgba(0,0,0,0.05);
      --chip-neutral-bor:  rgba(40,35,20,0.12);
      --chip-neutral-text: rgba(18,14,6,0.52);
      --chip-neutral-sel:  rgba(0,0,0,0.10);
      --chip-neutral-sbor: rgba(40,35,20,0.28);
      --chip-neutral-stxt: rgba(18,14,6,0.90);
      /* nav */
      --nav-active-bg:   rgba(29,78,216,0.10);
      --nav-hov-bg:      rgba(0,0,0,0.04);
      --nav-indicator:   #1D4ED8;
      /* misc */
      --input-bg:      rgba(0,0,0,0.04);
      --scrollbar:     rgba(0,0,0,0.15);
    }

    /* ═══════════════════════════════════════════════════════════
       GLOBAL RESETS & BASE STYLES
       ═══════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--t1);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      transition: background 0.25s ease, color 0.25s ease;
    }
    #root { display: flex; flex-direction: column; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }

    /* ═══════════════════════════════════════════════════════════
       MOTION TOKENS — Material Design 3 inspired
       ═══════════════════════════════════════════════════════════ */
    :root {
      /* MD3 easing curves */
      --ease-standard:           cubic-bezier(.2, 0, 0, 1);
      --ease-emphasized:         cubic-bezier(.2, 0, 0, 1);
      --ease-emphasized-decel:   cubic-bezier(.05, .7, .1, 1);
      --ease-emphasized-accel:   cubic-bezier(.3, 0, .8, .15);
      --ease-spring:             cubic-bezier(.34, 1.56, .64, 1);
      /* MD3 duration scale */
      --dur-50:   50ms;
      --dur-100: 100ms;
      --dur-200: 200ms;
      --dur-300: 300ms;
      --dur-400: 400ms;
      --dur-500: 500ms;
      --dur-700: 700ms;
    }

    /* Animations */
    @keyframes fadeUp     { from { opacity:0; transform:translateY(20px) scale(.985); } to { opacity:1; transform:none; } }
    @keyframes fadeIn     { from { opacity:0; } to { opacity:1; } }
    @keyframes fadeThrough{ 0%{opacity:0;transform:scale(.92);} 30%{opacity:0;} 100%{opacity:1;transform:none;} }
    @keyframes slideInRt  { from { opacity:0; transform:translateX(28px); } to { opacity:1; transform:none; } }
    @keyframes slideInLt  { from { opacity:0; transform:translateX(-28px); } to { opacity:1; transform:none; } }
    @keyframes shimmer    { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    @keyframes spin       { to { transform:rotate(360deg); } }
    @keyframes pulseRing  { 0%{transform:scale(1);opacity:.5} 100%{transform:scale(1.7);opacity:0} }
    @keyframes breathe    { 0%,100%{opacity:.4} 50%{opacity:.9} }
    @keyframes ripple     { 0%{transform:scale(0);opacity:.55;} 100%{transform:scale(2.6);opacity:0;} }
    @keyframes float      { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
    @keyframes shine      { 0%{background-position:-220% 0;} 100%{background-position:220% 0;} }
    @keyframes scaleIn    { from { opacity:0; transform:scale(.86); } to { opacity:1; transform:none; } }

    .fade-up         { animation: fadeUp     .42s var(--ease-emphasized-decel) both; }
    .fade-in         { animation: fadeIn     .26s var(--ease-standard) both; }
    .fade-through    { animation: fadeThrough .42s var(--ease-emphasized) both; }
    .slide-in-right  { animation: slideInRt  .42s var(--ease-emphasized-decel) both; }
    .slide-in-left   { animation: slideInLt  .42s var(--ease-emphasized-decel) both; }
    .scale-in        { animation: scaleIn    .32s var(--ease-spring) both; }
    .float           { animation: float      4.8s var(--ease-standard) infinite; }

    /* MD3 elevation hover lift */
    .md3-elevation { transition: transform .25s var(--ease-emphasized-decel), box-shadow .25s var(--ease-standard), border-color .2s var(--ease-standard); }
    .md3-elevation:hover { transform: translateY(-3px); }

    /* MD3 state layer helper — applied to interactive surfaces */
    .state-layer { position:relative; isolation:isolate; }
    .state-layer::after {
      content:''; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
      background: var(--t1); opacity: 0; transition: opacity var(--dur-100) var(--ease-standard);
    }
    .state-layer:hover::after  { opacity: 0.06; }
    .state-layer:active::after { opacity: 0.10; }

    /* Ripple element */
    .ripple-pulse {
      position:absolute; border-radius:50%;
      background: currentColor; pointer-events:none;
      animation: ripple .6s var(--ease-emphasized) both;
      opacity:.55; mix-blend-mode: overlay;
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--s3) 25%, var(--s4) 50%, var(--s3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 6px;
    }

    /* Theme transition */
    *, *::before, *::after {
      transition: background-color 0.22s ease, border-color 0.22s ease, color 0.22s ease;
    }
    /* Exclude animations from transition override */
    .skeleton, [style*="animation"] { transition: none !important; }

    /* ═══════════════════════════════════════════════════════════
       REDUCED MOTION — respect user preference (Phase 1)
       Neutralises transforms, ripples, shimmer; allows opacity fades.
       ═══════════════════════════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.05s !important;
        scroll-behavior: auto !important;
      }
      .fade-up, .scale-in, .slide-in-right, .slide-in-left, .fade-through {
        animation: fadeIn .05s linear both !important;
      }
      .float, .ripple-pulse, .skeleton {
        animation: none !important;
      }
      .md3-elevation:hover {
        transform: none !important;
      }
    }

    /* Range input */
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      height: 3px; border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width:14px; height:14px; border-radius:50%;
      background: var(--primary); cursor:pointer;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 25%, transparent);
      transition: transform .15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.2); }

    /* Text inputs */
    textarea, input[type=text], input[type=search] {
      background: var(--input-bg);
      border: 1px solid var(--b2);
      border-radius: 8px;
      color: var(--t1);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      padding: 10px 14px;
      resize: none;
      width: 100%;
    }
    textarea:focus, input[type=text]:focus, input[type=search]:focus {
      border-color: var(--primary);
      box-shadow: var(--focus-ring);
    }
    textarea::placeholder, input::placeholder { color: var(--t3); }

    select {
      background: var(--input-bg);
      border: 1px solid var(--b2);
      border-radius: 6px;
      color: var(--t2);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--primary); box-shadow: var(--focus-ring); }

    button { font-family: 'DM Sans', sans-serif; cursor: pointer; }

    :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    .drop-active { border-color: var(--primary) !important; background: var(--primary-dim) !important; }

    /* Font vars */
    :root {
      --font-display: 'Fraunces', Georgia, serif;
      --font-ui:      'DM Sans', system-ui, sans-serif;
      --font-accent:  'Syne', system-ui, sans-serif;
      --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px; --r-pill: 9999px;
    }
  </style>
</head>
